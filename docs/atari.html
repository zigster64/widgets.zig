<div class="nes-container with-title"><h3 class="title">Atari ST Widgets Demo</h3>
<p>Atari.css brings the 16-bit Atari ST aesthetic. Built on NES.css with custom fonts and palette.</p>
</div>
<div class="nes-container with-title"><h3 class="title">Buttons</h3>
<button class="nes-btn is-primary">primary</button>
<button class="nes-btn is-success">success</button>
<button class="nes-btn is-warning">warning</button>
<button class="nes-btn is-err">err</button>
<button class="nes-btn">Default</button>
</div>
<div class="nes-container with-title"><h3 class="title">Badges</h3>
<span class="nes-badge"><span class="is-primary">primary</span>
</span>
<span class="nes-badge"><span class="is-success">success</span>
</span>
<span class="nes-badge"><span class="is-warning">warning</span>
</span>
<span class="nes-badge"><span class="is-err">err</span>
</span>
</div>
<div class="nes-container with-title"><h3 class="title">Progress</h3>
<progress class="nes-progress is-primary" value="75" max="100"></progress>
<progress class="nes-progress is-warning" value="40" max="100"></progress>
</div>
<div class="nes-container with-title"><h3 class="title">Form</h3>
<input class="nes-input" type="text" placeholder="Character name">
<input class="nes-input" type="email" placeholder="games@atari.st">
<textarea class="nes-textarea" placeholder="High score message..."></textarea>
<select><option value="Dungeon Master">Dungeon Master</option>
<option value="Xenon 2">Xenon 2</option>
<option value="Lemmings">Lemmings</option>
</select>
<label><input class="nes-checkbox" type="checkbox">
Save progress</label>
<label><input class="nes-radio" type="radio" name="music">
MIDI</label>
<label><input class="nes-radio" type="radio" name="music">
YM2149</label>
</div>
<section class="nes-balloon from-left"><p>Atari ST power without the price.</p>
</section>
</body>
